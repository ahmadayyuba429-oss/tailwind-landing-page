<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get in Touch</title>

    
    <!---- Google Fonts ---->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">

    <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <header class="bg-white text-purple-500 font-[Inter]">
        <div class=" p-4 flex items-center gap-x-2 container mx-auto ">
            <img src="assets/logo pti.png" alt="PTI Logo" class="h-8 my-4 ">
            <span class="font-bold text-blue-500">PTI</span>
            <nav class="flex space-x-4 ml-6">
                <a href="#" class="text-gray-600 hover:text-purple-500  font-semibold">Home</a>
                <a href="#" class="text-gray-600 hover:text-purple-500  font-semibold">Products</a>
                <a href="#" class="text-gray-600 hover:text-purple-500  font-semibold">Resources</a>
                <a href="#" class="text-gray-600 hover:text-purple-500  font-semibold">Pricing</a>
            </nav>

            <div class="ml-auto flex-wrap items-center gap-x-2  ">
                <a href="#" class="text-gray-600 hover:text-purple-500 mx-2 font-semibold">Login</a>
                <a href="#" class="bg-purple-500 text-white px-3 py-3 rounded-xl hover:bg-purple-600 mx-2 font-semibold ">Sign Up</a>
         </div>

</header>

<main>
    <section class=" flex flex-col items-center gap-x-2 container mx-auto mt-10 font-[Inter]">
        <h2 class=" text-base font-medium text-purple-800 mb-3 ">Contact us</h2>
        <h1 class="text-5xl font-semibold text-gray-800 mb-4">Get in touch</h1>
        <p class="text-gray-600 mb-6 text-center mt-4 font-normal text-xl" >We’d love to hear from you. Please fill out this form.</p>
      <div class=""></div>
    </section>

    <section class="flex flex-wrap justify-center gap-2 mt-12 font-[Inter]"> 
        <form class="w-full max-w-lg bg-white p-8 rounded-sm shadow-sm">
          <div class="flex flex-col gap-4">

            <!-- First Name and Last Name -->
            <div class="flex flex-row gap-4 ">
             <div class="flex flex-col gap-1 w-1/2">
              <label for="first-name" class="text-sm font-medium text-gray-700">First Name</label>
              <input type="text" id="first-name" name="first-name" class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="First Name">
            </div>
            <div class="flex gap-1 flex-col w-1/2">
              <label for="last-name" class="text-sm font-medium text-gray-700">Last Name</label>
              <input type="text" id="last-name" name="last-name" class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Last Name">
            </div>
          </div>

          <!-- Email and Phone -->
            <div class="flex flex-col gap-2">
              <label for="email" class="text-sm font-medium text-gray-700">Email</label>
              <input type="email" id="email" name="email" class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Email Address">
            </div>
            <div class="flex flex-col gap-2 ">
              <label for="phone" class="text-sm font-medium text-gray-700">Phone</label>
              <input type="tel" id="phone" name="phone" class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="Phone Number">
            </div>

             <!-- aggrement-->
          <div class="mt-4">
            <input type="checkbox" id="privacy-policy" name="privacy-policy" class="mr-2">
            <label for="privacy-policy" class="text-sm text-gray-600">You agree to our <a href="#" class="text-purple-500 hover:underline hover:text-purple-700 ">privacy policy.</a></label>
          </div>

            <!-- Message -->
            <div class="flex flex-col gap-2">
              <label for="message" class="text-sm font-medium text-gray-700">Message</label>
              <textarea id="message" name="message" rows="4" class="border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-purple-500 placeholder-gray-400" placeholder="Leave us a message..."></textarea>
            </div>
            <button type="submit" class="bg-purple-500 text-white px-4 py-2 rounded-md hover:bg-purple-600 mt-4">Send Message</button>
          </div>
        </form>
</section>

</main>
</body>
  

</html>
